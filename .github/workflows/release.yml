name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - os: macos-latest
            goos: linux
          - os: windows-latest
            goos: linux
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o dist/no-pilot-${{ matrix.goos }}-${{ matrix.goarch }} .
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/no-pilot-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
